<!DOCTYPE html>
<html lang="de">
<head>

<title>VanJunge, Weiterbildung für Menschen, die Menschen begleiten</title>
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="polish.css">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: var(--font-primary);
    background: var(--color-bg);
    color: var(--color-fg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #root { min-height: 100vh; }
  button, input, textarea, select { font-family: var(--font-primary); }
  button { cursor: pointer; }
  a { color: inherit; }

  /* Subtle scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--color-lavender-xlight); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--color-lavender-light); }

  /* Focus rings */
  input:focus, textarea:focus, select:focus, button:focus-visible {
    outline: 2px solid var(--color-lavender-oil);
    outline-offset: 2px;
  }
  input, textarea, select { outline: none; }

  /* fade-in on route change */
  .route-fade {
    animation: routeFade 240ms ease;
  }
  @keyframes routeFade {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</head>
